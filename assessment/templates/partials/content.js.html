<script>
    function mixedContentTemplate(){
        var questions = {
            {% if questions or audio_questions or fillup_questions %}
                fields: [
                    {% for question in questions %}
                        {    
                            id: `{{ question.id }}`,
                            question: `{{ question.question|safe }}`,
                            
                            options: [
                                {% for option in question.options.all %}
                                    {
                                        id: {{ option.id }},
                                        option: `{{ option.option|safe }}`,
                                    },
                                {% endfor %}
                            ],
                            correct: `{{ question.correct_answer.id|safe }}`,
                            category: `{{ question.category }}`,
                            type: `question`,
                            having_assessment: `{{ question.having_assessment }}`,
                        },
                    {% endfor %}
                    {% for fillup in fillup_questions %}
                        {
                            id: `{{ fillup.id }}`,
                            sentence: `{{ fillup.sentence|safe }}`,
                            blank: [
                                {% for key, value in fillup.correct_answer.items %}
                                    {
                                        text: `{{ value|safe }}`,
                                    },
                                {% endfor %}
                            ],
                            type: `fillup`,
                            having_assessment: `{{ fillup.having_assessment }}`,
                        },
                    {% endfor %}
                    {% for ques in audio_questions %}
                        {
                            audio_question: `{{ ques.question.url }}`,
                            answer: `{{ ques.answer }}`,
                            audio_id: `aq_{{ ques.id }}`,
                            type: `audio`,
                            having_assessment: `{{ ques.having_assessment }}`,
                        },
                    {% endfor %}
                    ],
                    {% else %}
                    fields: [{
                        question: ``,
                        options: [
                        {text: `` },
                        {text: `` },
                        ],
                        correct: `1`,
                        type: `question`,
                        having_assessment: `False`,
                    }],
                    {% endif %}
            addNewQuestionField() {
                this.fields.push({
                    id: "new",
                    question: ``,
                    options: [
                        {text: `` },
                        {text: `` },
                    ],
                    correct: `1`,
                    type: `question`,
                    having_assessment: `False`,
                });
            },
            addNewfillupField() {
                this.fields.push({
                    id: "new",
                    sentence: ``,
                    blank: [
                    ],
                    type: `fillup`,
                    having_assessment: `False`,
                });
            },
            addNewAudioField() {
                this.fields.push({
                    audio_question: null,
                    answer: ``,
                    audio_id: `newaq_${this.fields.length + 1}`,
                    type: `audio`,
                });
            },
            removeMixedField(index) {
                if (this.fields.length > 1) {
                    // Remove the field at the specified index
                    if (this.fields[index].having_assessment == "True") {
                        alert("This question is part of an assessment and cannot be removed.");
                        return;
                    }
                    this.fields.splice(index, 1);

                    // Recalculate "newaq_*" IDs in order
                    let newCount = 1;
                    this.fields.forEach((field) => {
                        if (field.audio_id.startsWith("newaq_")) {
                            field.audio_id = `newaq_${newCount}`;
                            newCount++;
                        }
                    });
                }
            },
            updateAudioPreview(event, index) {
                const input = event.target;
                if (input.files && input.files[0]) {
                    const reader = new FileReader();
                    url = reader.readAsDataURL(input.files[0]);
                    reader.onload = (e) => {
                        this.fields[index].audio_question = e.target.result;
                    };
                }
            }
        }
        return questions;
    }
</script>
