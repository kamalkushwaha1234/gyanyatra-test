{% extends "base.html" %}
{% load static %}
{% block title %}
    Organization Report
{% endblock title %}

{% block content %}
<script>
    window.default_rows_json = JSON.parse('{{ default_rows_json|escapejs|default:'null' }}');
</script>
<script src="{% static 'js/organization-report.min.js' %}"></script>
<div id="report-alert" class="" role="alert"></div>

<div id="report-container">
    <div class="d-flex flex-wrap align-items-end gap-3 my-3 mx-4">
        <div>
            <label for="start-date-filter" class="form-label">Start Date</label>
            <input id="start-date-filter" type="date" class="form-control" value="{{ default_start_date }}">
        </div>
        <div>
            <label for="end-date-filter" class="form-label">End Date</label>
            <input id="end-date-filter" type="date" class="form-control" value="{{ default_end_date }}">
        </div>
        <div>
            <label for="organization-filter" class="form-label">Organization</label>
            <select id="organization-filter" class="form-select">
                <option value="">All</option>
                {% for organization in organizations %}
                    <option value="{{ organization.id }}">{{ organization.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label for="assessment-filter" class="form-label">Assessment</label>
            <select id="assessment-filter" class="form-select">
                <option value="">All</option>
                {% for assessment in assessments %}
                    <option value="{{ assessment.id }}">{{ assessment.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="d-flex gap-2">
            <button id="apply-filter" class="btn btn-outline-primary">Apply</button>
            <button id="reset-filter" class="btn btn-outline-secondary">Reset</button>
            <button id="download-report" class="btn btn-outline-success">Download Report</button>
        </div>
    </div>

    <div class="table-responsive my-3 mx-4">
        <table class="table table-bordered">
            <thead class="table-dark">
                <tr>
                    <th>S.No</th>
                    <th>Year</th>
                    <th>Month</th>
                    <th>Organization</th>
                    <th>Assessment Name</th>
                    <th>Assessment</th>
                </tr>
            </thead>
            <tbody id="report-table-body"></tbody>
        </table>
    </div>
</div>

{% endblock content %}
